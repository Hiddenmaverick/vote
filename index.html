<!DOCTYPE html>
<html>
<head>
  <title>Daily Vote Hub</title>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 60px;
      background-color: #f5f5f5;
    }

    h1 {
      margin-bottom: 10px;
    }

    #progress {
      font-size: 18px;
      margin: 20px 0;
    }

    button {
      font-size: 18px;
      padding: 12px 25px;
      margin: 10px;
      cursor: pointer;
    }

    #doneMessage {
      margin-top: 20px;
      font-weight: bold;
      color: green;
    }
  </style>
</head>
<body>

  <h1>Daily Voting Hub</h1>

  <div id="progress">0 / 14 completed</div>

  <button onclick="openNext()">Open Next Vote</button>
  <button onclick="resetVotes()">Reset</button>

  <div id="doneMessage"></div>

  <script>
    const links = [
      "https://www.toprpsites.com/details/SHAdmin/",
      "https://www.toprpsites.com/details/Shadow/",
      "https://www.toprpsites.com/details/Incantatem/",
      "https://www.toprpsites.com/details/twufoo/",
      "https://www.toprpsites.com/details/Logan/",
      "https://www.toprpsites.com/details/Jamestergirl7-945604/",
      "https://www.toprpsites.com/details/elpidarp/",
      "https://www.toprpsites.com/details/fh_admin/",
      "https://www.toprpsites.com/details/Wander/",
      "https://www.toprpsites.com/details/VHEA/",
      "https://www.toprpsites.com/details/sammiarty-625448/",
      "https://www.toprpsites.com/details/patches/",
      "https://www.toprpsites.com/details/serpent/",
      "https://www.toprpsites.com/details/scorch/"
    ];

    let currentIndex = 0;

    function updateProgress() {
      document.getElementById("progress").innerText =
        currentIndex + " / " + links.length + " completed";

      if (currentIndex >= links.length) {
        document.getElementById("doneMessage").innerText =
          "All voting pages opened.";
      }
    }

    function openNext() {
      if (currentIndex < links.length) {
        window.open(links[currentIndex], "_blank");
        currentIndex++;
        updateProgress();
      }
    }

    function resetVotes() {
      currentIndex = 0;
      document.getElementById("doneMessage").innerText = "";
      updateProgress();
    }

    updateProgress();
  </script>

</body>
</html>
